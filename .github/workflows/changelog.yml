name: 🚀 Update Changelog After Release

on:
  workflow_run:
    workflows: ['📦 Publish Package']
    types: [completed]

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run when publish succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full history/tags

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: Generate changelog
        run: npx auto-changelog -o CHANGELOG.md

      - name: 🔧 Commit and push changelog
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): update CHANGELOG.md after release"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
